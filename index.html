<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Festerwood — a lovingly disgusting plague</title>
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
  <a class="skip" href="#status-sec">Skip to status</a>

  <header>
    <h1>Festerwood</h1>
    <p class="tagline">A lovingly disgusting little plague. Grow it. Share it. Don't wash your hands.</p>
  </header>

  <!-- Screen-reader live regions: announcements only, never per-tick spam. -->
  <div id="sr-polite" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  <div id="sr-assertive" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

  <p id="news" class="news"></p>

  <main>
    <section id="status-sec" aria-labelledby="status-h">
      <h2 id="status-h">Status</h2>
      <p id="status-line">…</p>
      <div class="row">
        <button id="cough-btn" type="button">Cough (C)</button>
        <button id="status-btn" type="button">Read status aloud (S)</button>
      </div>
    </section>

    <section id="arena-sec" aria-labelledby="arena-h">
      <h2 id="arena-h">Arena</h2>
      <p id="arena-line">…</p>
      <p id="vitals" class="subhead">…</p>
      <div class="row">
        <button id="expand-btn" type="button" hidden>Expand (E)</button>
        <button id="wither-btn" type="button" hidden>Wither (W)</button>
      </div>
    </section>

    <section id="evo-sec" aria-labelledby="evo-h" hidden>
      <h2 id="evo-h">Evolutions</h2>
      <p id="biomass-line" class="subhead">…</p>
      <ul id="evo-list" class="cards"></ul>
    </section>

    <section id="perk-sec" aria-labelledby="perk-h" hidden>
      <h2 id="perk-h">Strains — permanent perks</h2>
      <p id="strain-line" class="subhead">…</p>
      <ul id="perk-list" class="cards"></ul>
    </section>

    <details id="ach-sec" hidden>
      <summary>Achievements</summary>
      <ul id="ach-list" class="cards"></ul>
    </details>

    <details id="set-sec">
      <summary>Settings &amp; Save</summary>
      <p>
        <label for="verbosity">Spoken announcements:</label>
        <select id="verbosity">
          <option value="quiet">Quiet</option>
          <option value="normal" selected>Normal</option>
          <option value="chatty">Chatty</option>
        </select>
      </p>
      <div class="row">
        <button id="export-btn" type="button">Export save</button>
        <button id="import-btn" type="button">Import save</button>
        <button id="hardreset-btn" type="button">Hard reset</button>
      </div>
      <textarea id="save-io" rows="3" aria-label="Save data (copy out, or paste in then press Import)" hidden></textarea>
    </details>

    <details id="help-sec">
      <summary>How to play</summary>
      <div id="help" tabindex="-1"></div>
    </details>
  </main>

  <!-- break_eternity installs the global `Decimal`; it must run before the modules. -->
  <script src="vendor/break_eternity.min.js"></script>
  <script type="module" src="main.js?v=5"></script>
</body>
</html>
